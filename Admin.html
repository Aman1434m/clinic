<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Info Partner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Simple Firebase Compatible Setup -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; padding: 20px; display: none; }
        .container { max-width: 800px; margin: 0 auto; }
        .box { background: #1e293b; padding: 30px; border-radius: 12px; margin-bottom: 25px; border-top: 5px solid #2563eb; box-shadow: 0 10px 15px rgba(0,0,0,0.3); }
        .box.scheme-box { border-top-color: #059669; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; font-family: inherit; }
        button { background: #2563eb; color: white; padding: 12px 20px; border: none; cursor: pointer; border-radius: 6px; font-weight: bold; width: 100%; font-size: 1.1em; transition: 0.3s; }
        button:hover { background: #1d4ed8; }
        .scheme-box button { background: #059669; }
        .scheme-box button:hover { background: #047857; }
        
        h1, h2 { text-align: center; margin-bottom: 20px; }
        h3 { color: #f8fafc; margin-bottom: 15px; }
        
        .list-item { background: #334155; padding: 15px; margin: 10px 0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { background: #ef4444; width: auto; padding: 8px 15px; font-size: 0.9em; margin-left: 10px; }
        .del-btn:hover { background: #dc2626; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span style="color: #60a5fa;">Info Partner</span> Admin Panel</h1>
        <p style="text-align: center; color: #94a3b8; margin-bottom: 30px;">Koi bhi item add kariye, wo turant aam public website par dikhega.</p>

        <!-- Scholarship Form -->
        <div class="box">
            <h3>Add New Scholarship</h3>
            <input type="text" id="schTitle" placeholder="Scholarship Title (e.g. Post Matric SC/ST)">
            <input type="text" id="schProvider" placeholder="Provider (e.g. Govt of India)">
            <input type="text" id="schDeadline" placeholder="Last Date (e.g. 30 June 2026)">
            <textarea id="schDesc" placeholder="Overview / Description..." rows="3"></textarea>
            <input type="url" id="schUrl" placeholder="Official Apply URL (Link)">
            <button onclick="addScholarship()">Push Scholarship Live</button>
            <div id="schList" style="margin-top: 20px;"></div>
        </div>

        <!-- Scheme Form -->
        <div class="box scheme-box">
            <h3>Add New Government Scheme</h3>
            <input type="text" id="scTitle" placeholder="Scheme Title (e.g. PM-KISAN)">
            <input type="text" id="scProvider" placeholder="Ministry / State (e.g. Ministry of Agriculture)">
            <textarea id="scDesc" placeholder="Overview / Benefits..." rows="3"></textarea>
            <input type="url" id="scUrl" placeholder="Official Website URL (Link)">
            <button onclick="addScheme()">Push Scheme Live</button>
            <div id="scList" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script>
        // Security Prompt (Single File Easy Login)
        const pass = prompt("Enter Admin Password:");
        if(pass === "admin123") {
            document.body.style.display = "block";
        } else {
            alert("Wrong Password! Access Denied.");
            window.location.href = "index.html"; 
        }

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAKA0U_XD_Txbfes-E-ZUDFPHjmswEV_KA",
            authDomain: "success-coaching-8230b.firebaseapp.com",
            projectId: "success-coaching-8230b",
            storageBucket: "success-coaching-8230b.firebasestorage.app",
            messagingSenderId: "1086069647096",
            appId: "1:1086069647096:web:9f66a46f30eaba89a9bd0d"
        };
        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref('infoPartnerDb');
        
        // Load Realtime Data for deletion UI
        dbRef.on('value', (snap) => {
            const data = snap.val() || { scholarships: {}, schemes: {} };
            
            // Render Scholarship Delete List
            let schHtml = '';
            if(data.scholarships) {
                Object.keys(data.scholarships).forEach(key => {
                    schHtml += `<div class="list-item"><b>${data.scholarships[key].title}</b> 
                               <button class="del-btn" onclick="deleteItem('scholarships', '${key}')">Delete</button></div>`;
                });
            }
            document.getElementById('schList').innerHTML = schHtml;

            // Render Scheme Delete List
            let scHtml = '';
            if(data.schemes) {
                Object.keys(data.schemes).forEach(key => {
                    scHtml += `<div class="list-item"><b>${data.schemes[key].title}</b> 
                               <button class="del-btn" onclick="deleteItem('schemes', '${key}')">Delete</button></div>`;
                });
            }
            document.getElementById('scList').innerHTML = scHtml;
        });

        // Add Scholarship to DB
       function addScholarship() {
            const title = document.getElementById('schTitle').value;
            const provider = document.getElementById('schProvider').value;
            const deadline = document.getElementById('schDeadline').value;
            const desc = document.getElementById('schDesc').value;
            const link = document.getElementById('schUrl').value;
            
            if(!title || !desc) return alert("Title and Description are required");
            
            dbRef.child('scholarships').push({ title, provider, deadline, desc, link })
                .then(() => { alert("Scholarship Added!"); clearSch(); })
                .catch(e => alert("Error: " + e.message));
        }

        // Add Scheme to DB
        function addScheme() {
            const title = document.getElementById('scTitle').value;
            const provider = document.getElementById('scProvider').value;
            const desc = document.getElementById('scDesc').value;
            const link = document.getElementById('scUrl').value;
            
            if(!title || !desc) return alert("Title and Description are required");
            
            dbRef.child('schemes').push({ title, provider, desc, link })
                .then(() => { alert("Scheme Added!"); clearSc(); })
                .catch(e => alert("Error: " + e.message));
        }

        // Delete any Item
        function deleteItem(type, key) {
            if(confirm("Confirm Delete? Yeh action wapas nahi ho sakta!")) {
                dbRef.child(type).child(key).remove()
                    .then(() => alert("Deleted successfully"))
                    .catch(e => alert("Error: " + e.message));
            }
        }

        // Clear Form Inputs functions
        function clearSch() {
            ['schTitle','schProvider','schDeadline','schDesc','schUrl'].forEach(i => document.getElementById(i).value = '');
        }
        function clearSc() {
            ['scTitle','scProvider','scDesc','scUrl'].forEach(i => document.getElementById(i).value = '');
        }
    </script>
</body>
</html>
