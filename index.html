<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUCCESS COACHING CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f8f9fa; color: #333; overflow-x: hidden; scroll-behavior: smooth; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.06); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.6em; font-weight: 800; color: #a17c52; }
        .nav-links a { margin: 0 10px; font-size: 0.9em; color: #555; text-decoration: none; font-weight: 600; }

        .hero { display: flex; align-items: center; justify-content: space-between; padding: 60px 50px; background: linear-gradient(135deg, #fdfaf5 0%, #f4eee1 100%); }
        .hero-text { flex: 1.5; padding-right: 20px; }
        .tagline { font-size: 2.2em; font-weight: 800; line-height: 1.2; margin-bottom: 15px; }
        .tagline .line-2 { color: #a17c52; }
        .hero-image img { width: 300px; height: 300px; border-radius: 50%; object-fit: cover; border: 6px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

        .section-wrapper { padding: 60px 20px; text-align: center; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 4px solid #a17c52; }
        .card a { display: inline-block; padding: 8px 20px; background: #a17c52; color: #fff; text-decoration: none; border-radius: 5px; margin-top: 10px; }

        @media (max-width: 768px) {
            .navbar { padding: 15px; }
            .hero { flex-direction: row; padding: 30px 15px; align-items: center; }
            .tagline { font-size: 1.2em; }
            .hero-image img { width: 110px; height: 110px; }
            .hero-text p { font-size: 0.8em; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">SUCCESS COACHING</div>
        <div class="nav-links">
            <a href="#links-section">लिंक्स</a>
            <a href="#mcq-section">टेस्ट</a>
            <a href="#notes-section">नोट्स</a>
        </div>
    </div>

    <div class="hero">
        <div class="hero-text">
            <h1 class="tagline">
                <span>चीते की चाल, बाज़ की नज़र,</span>
                <span class="line-2">और AR RAQEEB के कॉन्सेप्ट पर</span>
                <span>संदेह नहीं करते!</span>
            </h1>
            <p>Quality Education for Better Future.</p>
        </div>
        <div class="hero-image"><img src="principal.jpg" id="mainHeroImage"></div>
    </div>

    <div id="links-section" class="section-wrapper">
        <h2>जरूरी लिंक्स</h2>
        <div class="grid-container" id="linksContainer"></div>
    </div>

    <div id="notes-section" class="section-wrapper">
        <h2>क्लास नोट्स</h2>
        <div class="grid-container" id="notesContainer"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAKA0U_XD_Txbfes-E-ZUDFPHjmswEV_KA",
            authDomain: "success-coaching-8230b.firebaseapp.com",
            projectId: "success-coaching-8230b",
            storageBucket: "success-coaching-8230b.firebasestorage.app",
            messagingSenderId: "1086069647096",
            appId: "1:1086069647096:web:9f66a46f30eaba89a9bd0d"
        };
        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref('coachingProData');

        dbRef.on('value', (snap) => {
            const data = snap.val();
            if(data) {
                if(data.heroImage) document.getElementById('mainHeroImage').src = data.heroImage;
                renderData(data);
            }
        });

        function renderData(data) {
            const lCon = document.getElementById('linksContainer');
            lCon.innerHTML = (data.links || []).map(l => `<div class="card"><h3>${l.title}</h3><a href="${l.url}" target="_blank">Open Link</a></div>`).join('');
            
            const nCon = document.getElementById('notesContainer');
            nCon.innerHTML = (data.notes || []).map(n => `<div class="card"><h3>${n.title}</h3><a href="${n.fileUrl}" download>Download</a></div>`).join('');
        }
    </script>
</body>
</html>
