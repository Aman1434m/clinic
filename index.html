<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TapCoin Game</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; }
        nav { margin: 20px; }
        .tab { display: none; }
        .active { display: block; }
    </style>
</head>
<body>
    <nav>
        <button onclick="showTab('tap')">Tap</button>
        <button onclick="showTab('invite')">Invite</button>
        <button onclick="showTab('mine')">Mine</button>
    </nav>
    <div id="tap" class="tab active">
        <h1>Tap Coins</h1>
        <p id="coinCount">Coins: 0</p>
        <button onclick="tapCoin()">Tap!</button>
    </div>
    <div id="invite" class="tab">
        <h1>Invite Friends</h1>
        <p>Friends Invited: <span id="friendsInvited">0</span></p>
        <button onclick="inviteFriend()">Invite Friend</button>
    </div>
    <div id="mine" class="tab">
        <h1>Mining</h1>
        <button onclick="selectMiningTier('basic')">Basic Mining (1 coin/min)</button>
        <button onclick="selectMiningTier('advanced')">Advanced Mining (5 coins/min)</button>
        <button onclick="selectMiningTier('elite')">Elite Mining (15 coins/min)</button>
        <p>Current Mining Tier: <span id="currentTier">None</span></p>
    </div>

    <script>
        let coins = 0;
        let friendsInvited = 0;
        let miningInterval;
        let miningRate = 0;

        function tapCoin() {
            coins++;
            document.getElementById('coinCount').innerText = 'Coins: ' + coins;
        }

        function inviteFriend() {
            friendsInvited++;
            document.getElementById('friendsInvited').innerText = friendsInvited;
            unlockFeatures();
        }

        function unlockFeatures() {
            if(friendsInvited > 0) {
                // Enable special features
                alert('You can now unlock special tap features!');
            }
        }

        function selectMiningTier(tier) {
            switch(tier) {
                case 'basic':
                    miningRate = 1;
                    break;
                case 'advanced':
                    miningRate = 5;
                    break;
                case 'elite':
                    miningRate = 15;
                    break;
            }
            document.getElementById('currentTier').innerText = tier.charAt(0).toUpperCase() + tier.slice(1) + ' Mining';
            startMining();
        }

        function startMining() {
            clearInterval(miningInterval);
            miningInterval = setInterval(() => {
                coins += miningRate;
                document.getElementById('coinCount').innerText = 'Coins: ' + coins;
            }, 60000); // Every minute
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }
    </script>
</body>
</html>
