<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Online Code Editor</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-darker.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/display/placeholder.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/sql/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/shell/shell.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        /* Custom Overrides for CodeMirror to stretch full height */
        .CodeMirror {
            height: 100%;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            font-size: 15px;
        }
        .CodeMirror-empty.CodeMirror-focused { opacity: 0.6; }
        .CodeMirror-pre.CodeMirror-empty { color: #888; }
        
        /* Custom scrollbar for terminal */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col overflow-hidden">

    <div id="homeScreen" class="w-full h-full overflow-y-auto p-6 md:p-10">
        <div class="max-w-6xl mx-auto">
            <header class="text-center mb-12">
                <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-4">
                    {'</>'} CodePlay Platform
                </h1>
                <p class="text-gray-400 text-lg">Select your domain and language to start coding.</p>
            </header>

            <div id="categoriesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </div>
    </div>

    <div id="editorScreen" class="w-full h-full flex flex-col hidden">
        
        <header class="bg-gray-800 border-b border-gray-700 p-3 flex flex-wrap items-center justify-between gap-3 shadow-md">
            <div class="flex items-center gap-4">
                <button id="backBtn" class="text-gray-400 hover:text-white transition-colors flex items-center gap-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back
                </button>
                <div class="h-6 w-px bg-gray-600"></div>
                <h1 id="dynamicTitle" class="text-xl font-bold tracking-wider text-blue-400">
                    {'</>'} HTML
                </h1>
            </div>
            
            <div class="flex flex-wrap items-center gap-2">
                <button id="checkBtn" class="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-md text-sm font-semibold transition-colors flex items-center gap-1 shadow-sm">
                    ▶ Run / Preview
                </button>
                <button id="clearBtn" class="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-md text-sm font-semibold transition-colors flex items-center gap-1 shadow-sm">
                    ✖ Clear
                </button>
                <button id="downloadBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-md text-sm font-semibold transition-colors flex items-center gap-1 shadow-sm">
                    ↓ Download
                </button>
            </div>
        </header>

        <main class="flex-1 flex flex-col lg:flex-row w-full h-full overflow-hidden">
            <section class="w-full lg:w-1/2 h-1/2 lg:h-full border-b lg:border-b-0 lg:border-r border-gray-700 relative">
                <textarea id="codeEditor"></textarea>
            </section>

            <section class="w-full lg:w-1/2 h-1/2 lg:h-full relative bg-gray-100 flex flex-col">
                <div id="outputLabel" class="absolute top-0 right-0 bg-gray-800 text-gray-200 text-xs px-3 py-1 rounded-bl-md z-10 font-bold opacity-90 shadow-sm border-l border-b border-gray-700 pointer-events-none">
                    Live Preview
                </div>
                
                <iframe id="previewFrame" class="w-full h-full border-none bg-white"></iframe>
                
                <div id="terminalOutput" class="w-full h-full bg-gray-950 text-green-400 p-4 font-mono text-sm overflow-y-auto hidden">
                    <div class="text-gray-500 mb-2">System Console Output...</div>
                    <div id="terminalContent"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // 1. Languages and Categories Configuration
        const techDomains = {
            "Web Development": [
                { name: "HTML", mode: "htmlmixed", icon: "</>", type: "web", ext: "html" },
                { name: "CSS", mode: "css", icon: "/* */", type: "web", ext: "css" },
                { name: "JavaScript", mode: "javascript", icon: "{ }", type: "web", ext: "js" }
            ],
            "Software Development": [
                { name: "C++", mode: "text/x-c++src", icon: "C++", type: "console", ext: "cpp" },
                { name: "Java", mode: "text/x-java", icon: "☕", type: "console", ext: "java" },
                { name: "C#", mode: "text/x-csharp", icon: "C#", type: "console", ext: "cs" }
            ],
            "Mobile Development": [
                { name: "Kotlin", mode: "text/x-java", icon: "Kt", type: "console", ext: "kt" },
                { name: "Swift", mode: "text/x-c++src", icon: "🍎", type: "console", ext: "swift" },
                { name: "Dart", mode: "javascript", icon: "🎯", type: "console", ext: "dart" }
            ],
            "AI & Data Science": [
                { name: "Python", mode: "python", icon: ">_", type: "console", ext: "py" },
                { name: "R", mode: "python", icon: "R", type: "console", ext: "r" }
            ],
            "Database Languages": [
                { name: "SQL", mode: "sql", icon: "[(]", type: "console", ext: "sql" }
            ],
            "Scripting & Automation": [
                { name: "Bash / Shell", mode: "shell", icon: "$", type: "console", ext: "sh" },
                { name: "PowerShell", mode: "shell", icon: ">_", type: "console", ext: "ps1" }
            ],
            "Game Development": [
                { name: "C++ (Unreal)", mode: "text/x-c++src", icon: "🎮", type: "console", ext: "cpp" },
                { name: "C# (Unity)", mode: "text/x-csharp", icon: "🎮", type: "console", ext: "cs" }
            ]
        };

        // Current state
        let currentLang = null;

        // 2. Initialize CodeMirror
        const editorElement = document.getElementById('codeEditor');
        const editor = CodeMirror.fromTextArea(editorElement, {
            mode: 'htmlmixed',
            theme: 'material-darker',
            lineNumbers: true,
            indentUnit: 4,
            placeholder: "Select a language to start typing..."
        });

        // DOM Elements
        const homeScreen = document.getElementById('homeScreen');
        const editorScreen = document.getElementById('editorScreen');
        const categoriesGrid = document.getElementById('categoriesGrid');
        const backBtn = document.getElementById('backBtn');
        const dynamicTitle = document.getElementById('dynamicTitle');
        const checkBtn = document.getElementById('checkBtn');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const previewFrame = document.getElementById('previewFrame');
        const terminalOutput = document.getElementById('terminalOutput');
        const terminalContent = document.getElementById('terminalContent');
        const outputLabel = document.getElementById('outputLabel');

        // 3. Render Categories and Languages on Home Screen
        for (const [domain, languages] of Object.entries(techDomains)) {
            // Create Card
            const card = document.createElement('div');
            card.className = "bg-gray-800 border border-gray-700 rounded-lg p-5 hover:border-blue-500 transition-colors shadow-lg";
            
            // Domain Title
            const title = document.createElement('h2');
            title.className = "text-xl font-bold text-white border-b border-gray-700 pb-2 mb-4";
            title.innerText = domain;
            card.appendChild(title);
            
            // Languages Container
            const langContainer = document.createElement('div');
            langContainer.className = "flex flex-wrap gap-2";
            
            languages.forEach(lang => {
                const btn = document.createElement('button');
                btn.className = "bg-gray-700 hover:bg-blue-600 text-sm text-gray-200 py-1.5 px-3 rounded shadow transition-colors";
                btn.innerText = lang.name;
                btn.onclick = () => openEditor(lang);
                langContainer.appendChild(btn);
            });

            card.appendChild(langContainer);
            categoriesGrid.appendChild(card);
        }

        // 4. Navigation & Setup Logic
        function openEditor(langConfig) {
            currentLang = langConfig;
            
            // UI Switch
            homeScreen.classList.add('hidden');
            editorScreen.classList.remove('hidden');
            
            // Update Header Syntax/Title
            dynamicTitle.innerText = `${langConfig.icon} ${langConfig.name}`;
            
            // Configure CodeMirror
            editor.setOption("mode", langConfig.mode);
            editor.setValue("");
            editor.setOption("placeholder", `Write your ${langConfig.name} code here...`);
            
            // Setup Output Area (Iframe for Web, Terminal for Console)
            if (langConfig.type === 'web') {
                previewFrame.classList.remove('hidden');
                terminalOutput.classList.add('hidden');
                outputLabel.innerText = "Live Preview";
                previewFrame.srcdoc = ""; // Clear iframe
            } else {
                previewFrame.classList.add('hidden');
                terminalOutput.classList.remove('hidden');
                outputLabel.innerText = "Console Output";
                terminalContent.innerHTML = "";
            }

            // Refresh editor to fix sizing bugs after unhiding
            setTimeout(() => editor.refresh(), 10);
        }

        backBtn.addEventListener('click', () => {
            editorScreen.classList.add('hidden');
            homeScreen.classList.remove('hidden');
        });

        // 5. Run / Check Logic
        checkBtn.addEventListener('click', () => {
            const code = editor.getValue();
            
            if (currentLang.type === 'web') {
                // Web Dev Live Preview
                const documentContent = previewFrame.contentDocument || previewFrame.contentWindow.document;
                documentContent.open();
                
                if (currentLang.name === 'CSS') {
                    documentContent.write(`<style>${code}</style> <div style="font-family:sans-serif; padding:20px; color:#333;"><h2>CSS Test</h2><p>Your CSS is applied to this body.</p></div>`);
                } else if (currentLang.name === 'JavaScript') {
                    documentContent.write(`
                        <div style="font-family:sans-serif; padding:10px;">Check browser console or output below.</div>
                        <script>
                            // Override console.log to show on screen for quick JS testing
                            const oldLog = console.log;
                            console.log = function(...args) {
                                document.body.innerHTML += '<div style="background:#eee; padding:5px; margin-bottom:2px; border-left:3px solid blue;">> ' + args.join(' ') + '</div>';
                                oldLog(...args);
                            };
                            try {
                                ${code}
                            } catch(e) {
                                document.body.innerHTML += '<div style="color:red; padding:5px;">Error: ' + e.message + '</div>';
                            }
                        <\/script>`);
                } else {
                    documentContent.write(code);
                }
                documentContent.close();
            } else {
                // Console Languages (Backend execution simulation)
                // Browser cannot natively run C++/Python without WASM/Backend
                const timestamp = new Date().toLocaleTimeString();
                terminalContent.innerHTML = `
                    <div class="mb-3">
                        <span class="text-blue-400">user@codeplay:~$</span> run ${currentLang.name.toLowerCase()}_script.${currentLang.ext} <br>
                        <span class="text-gray-400">[${timestamp}] Executing...</span>
                    </div>
                    <div class="text-yellow-400 border-l-2 border-yellow-600 pl-3 mb-3">
                        <b>Note:</b> This is a frontend-only platform. Compiling and running backend/system languages like <b>${currentLang.name}</b> directly in the browser requires a backend server or WebAssembly integration. <br><br>
                        Your code has been saved locally in the editor. Use the <b>Download</b> button to save and run it on your local machine.
                    </div>
                    <div class="text-white opacity-50">Code preview:<br>${code.substring(0, 50).replace(/</g, "&lt;").replace(/>/g, "&gt;")}${code.length > 50 ? '...' : ''}</div>
                `;
            }
        });

        // 6. Clear Logic
        clearBtn.addEventListener('click', () => {
            editor.setValue("");
            if (currentLang.type === 'web') {
                previewFrame.srcdoc = "";
            } else {
                terminalContent.innerHTML = "";
            }
        });

        // 7. Download Logic
        downloadBtn.addEventListener('click', () => {
            const code = editor.getValue();
            if(!code.trim()) {
                alert("The editor is empty. Please write some code to download.");
                return;
            }

            const ext = currentLang.ext;
            const blob = new Blob([code], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `main.${ext}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
