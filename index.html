<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Online Code Editor</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-darker.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/lint.min.css">

    <script src="https://unpkg.com/jshint/dist/jshint.js"></script>
    <script src="https://unpkg.com/csslint/release/csslint.js"></script>
    <script src="https://unpkg.com/htmlhint/dist/htmlhint.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/display/placeholder.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/lint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/javascript-lint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/css-lint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/html-lint.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/php/php.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/go/go.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/rust/rust.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/swift/swift.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/dart/dart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/sql/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/r/r.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/shell/shell.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/perl/perl.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/lua/lua.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .CodeMirror {
            height: 100%;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            font-size: 15px;
        }
        .CodeMirror-empty.CodeMirror-focused { opacity: 0.6; }
        .CodeMirror-pre.CodeMirror-empty { color: #888; }
        
        /* Custom Red Squiggly Line for Errors */
        .CodeMirror-lint-mark-error {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='6' height='3'><path d='M0 3 L3 0 L6 3' fill='none' stroke='red' stroke-width='1'/></svg>");
            background-repeat: repeat-x;
            background-position: bottom left;
            border-bottom: none;
        }

        /* Home Screen Card Animations */
        .category-card { transition: all 0.3s ease; }
        .category-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 30px -5px rgba(59, 130, 246, 0.4);
            border-color: #3b82f6;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col overflow-hidden">

    <div id="homeScreen" class="w-full h-full overflow-y-auto p-6 md:p-10 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-gray-800 via-gray-900 to-black">
        <div class="max-w-7xl mx-auto">
            <header class="text-center mb-12 mt-4">
                <h1 class="text-5xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 mb-4 drop-shadow-lg">
                    {'</>'} CodePlay Studio
                </h1>
                <p class="text-gray-400 text-xl">Choose your development field to start coding</p>
            </header>

            <div id="categoriesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                </div>
        </div>
    </div>

    <div id="editorScreen" class="w-full h-full flex flex-col hidden">
        <header class="bg-gray-800 border-b border-gray-700 p-3 flex flex-wrap items-center justify-between gap-3 shadow-md">
            <div class="flex items-center gap-4">
                <button id="backBtn" class="text-gray-400 hover:text-white transition-colors flex items-center gap-1 bg-gray-700 px-3 py-1.5 rounded-md hover:bg-gray-600">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back
                </button>
                <div class="h-6 w-px bg-gray-600 hidden md:block"></div>
                <h1 id="dynamicSyntax" class="text-lg md:text-xl font-bold tracking-wider text-blue-400">
                    {'</>'} CodePlay
                </h1>
            </div>
            
            <div class="flex flex-wrap items-center gap-2 md:gap-3">
                <select id="langSelector" class="bg-gray-700 border border-gray-600 text-white text-sm rounded-md focus:ring-blue-500 focus:border-blue-500 block p-2 cursor-pointer transition-colors outline-none font-semibold">
                </select>

                <button id="checkBtn" class="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-md text-sm font-semibold transition-colors flex items-center gap-1 shadow-sm">
                    ▶ Run
                </button>
                <button id="clearBtn" class="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-md text-sm font-semibold transition-colors flex items-center gap-1 shadow-sm">
                    ✖ Clear
                </button>
                <button id="downloadBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-md text-sm font-semibold transition-colors flex items-center gap-1 shadow-sm">
                    ↓ Save
                </button>
            </div>
        </header>

        <main class="flex-1 flex flex-col lg:flex-row w-full h-full overflow-hidden">
            <section class="w-full lg:w-1/2 h-1/2 lg:h-full border-b lg:border-b-0 lg:border-r border-gray-700 relative">
                <textarea id="codeEditor"></textarea>
            </section>

            <section class="w-full lg:w-1/2 h-1/2 lg:h-full relative bg-gray-100 flex flex-col">
                <div id="outputLabel" class="absolute top-0 right-0 bg-gray-800 text-gray-200 text-xs px-3 py-1 rounded-bl-md z-10 font-bold opacity-90 shadow-sm border-l border-b border-gray-700 pointer-events-none">
                    Preview
                </div>
                
                <iframe id="previewFrame" class="w-full h-full border-none bg-white"></iframe>
                
                <div id="terminalOutput" class="w-full h-full bg-gray-950 text-green-400 p-4 font-mono text-sm overflow-y-auto hidden">
                    <div class="text-gray-500 mb-4 border-b border-gray-800 pb-2">Terminal Ready...</div>
                    <div id="terminalContent" class="space-y-2"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // 1. Exact Categories and Languages Structure (As Requested)
        const categoriesData = {
            "web": {
                title: "Web Development", icon: "🌐", type: "web",
                languages: [
                    { id: "html", name: "HTML", mode: "htmlmixed", syntax: "</>", ext: "html", lint: true },
                    { id: "css", name: "CSS", mode: "css", syntax: "{;}", ext: "css", lint: true },
                    { id: "js", name: "JavaScript", mode: "javascript", syntax: "JS", ext: "js", lint: true },
                    { id: "php", name: "PHP", mode: "application/x-httpd-php", syntax: "PHP", ext: "php", lint: false },
                    { id: "ts", name: "TypeScript", mode: "application/typescript", syntax: "TS", ext: "ts", lint: false }
                ]
            },
            "software": {
                title: "Software Development", icon: "💻", type: "console",
                languages: [
                    { id: "c", name: "C", mode: "text/x-csrc", syntax: "C", ext: "c", lint: false },
                    { id: "cpp", name: "C++", mode: "text/x-c++src", syntax: "C++", ext: "cpp", lint: false },
                    { id: "java", name: "Java", mode: "text/x-java", syntax: "☕", ext: "java", lint: false },
                    { id: "python", name: "Python", mode: "python", syntax: "Py", ext: "py", lint: false },
                    { id: "csharp", name: "C#", mode: "text/x-csharp", syntax: "C#", ext: "cs", lint: false },
                    { id: "go", name: "Go", mode: "text/x-go", syntax: "Go", ext: "go", lint: false },
                    { id: "rust", name: "Rust", mode: "rust", syntax: "Rust", ext: "rs", lint: false },
                    { id: "kotlin", name: "Kotlin", mode: "text/x-kotlin", syntax: "Kt", ext: "kt", lint: false },
                    { id: "swift", name: "Swift", mode: "swift", syntax: "🍎", ext: "swift", lint: false }
                ]
            },
            "mobile": {
                title: "Mobile Development", icon: "📱", type: "console",
                languages: [
                    { id: "dart", name: "Dart", mode: "dart", syntax: "🎯", ext: "dart", lint: false },
                    { id: "kotlin_mob", name: "Kotlin", mode: "text/x-kotlin", syntax: "Kt", ext: "kt", lint: false },
                    { id: "swift_mob", name: "Swift", mode: "swift", syntax: "🍎", ext: "swift", lint: false },
                    { id: "java_mob", name: "Java", mode: "text/x-java", syntax: "☕", ext: "java", lint: false }
                ]
            },
            "database": {
                title: "Database", icon: "🗄️", type: "console",
                languages: [
                    { id: "sql", name: "SQL", mode: "text/x-sql", syntax: "SQL", ext: "sql", lint: false },
                    { id: "plsql", name: "PL/SQL", mode: "text/x-plsql", syntax: "PL/SQL", ext: "sql", lint: false }
                ]
            },
            "ai_data": {
                title: "AI & Data Science", icon: "🧠", type: "console",
                languages: [
                    { id: "py_ai", name: "Python", mode: "python", syntax: "Py", ext: "py", lint: false },
                    { id: "r", name: "R", mode: "text/x-rsrc", syntax: "R", ext: "r", lint: false },
                    { id: "java_ai", name: "Java", mode: "text/x-java", syntax: "☕", ext: "java", lint: false },
                    { id: "cpp_ai", name: "C++", mode: "text/x-c++src", syntax: "C++", ext: "cpp", lint: false },
                    { id: "sql_ai", name: "SQL", mode: "text/x-sql", syntax: "SQL", ext: "sql", lint: false }
                ]
            },
            "scripting": {
                title: "Scripting & Auto", icon: "⚙️", type: "console",
                languages: [
                    { id: "bash", name: "Bash", mode: "shell", syntax: "$_", ext: "sh", lint: false },
                    { id: "powershell", name: "PowerShell", mode: "powershell", syntax: ">_", ext: "ps1", lint: false },
                    { id: "perl", name: "Perl", mode: "perl", syntax: "Pl", ext: "pl", lint: false }
                ]
            },
            "game": {
                title: "Game Development", icon: "🎮", type: "console",
                languages: [
                    { id: "cpp_game", name: "C++", mode: "text/x-c++src", syntax: "C++", ext: "cpp", lint: false },
                    { id: "csharp_game", name: "C#", mode: "text/x-csharp", syntax: "C#", ext: "cs", lint: false },
                    { id: "java_game", name: "Java", mode: "text/x-java", syntax: "☕", ext: "java", lint: false },
                    { id: "c_game", name: "C", mode: "text/x-csrc", syntax: "C", ext: "c", lint: false },
                    { id: "lua", name: "Lua", mode: "lua", syntax: "Lua", ext: "lua", lint: false },
                    { id: "dart_game", name: "Dart", mode: "dart", syntax: "🎯", ext: "dart", lint: false }
                ]
            }
        };

        let currentCategory = null;
        let currentLangConfig = null;

        // 2. Initialize CodeMirror with Linting enabled
        const editorElement = document.getElementById('codeEditor');
        const editor = CodeMirror.fromTextArea(editorElement, {
            theme: 'material-darker',
            lineNumbers: true,
            indentUnit: 4,
            gutters: ["CodeMirror-lint-markers"],
            lint: true // Enables red squiggly lines for supported languages (HTML/CSS/JS)
        });

        // DOM Elements
        const homeScreen = document.getElementById('homeScreen');
        const editorScreen = document.getElementById('editorScreen');
        const categoriesGrid = document.getElementById('categoriesGrid');
        const langSelector = document.getElementById('langSelector');
        const dynamicSyntax = document.getElementById('dynamicSyntax');
        const previewFrame = document.getElementById('previewFrame');
        const terminalOutput = document.getElementById('terminalOutput');
        const terminalContent = document.getElementById('terminalContent');
        const outputLabel = document.getElementById('outputLabel');

        // 3. Render Home Screen Cards
        for (const [key, data] of Object.entries(categoriesData)) {
            const card = document.createElement('div');
            card.className = "category-card bg-gray-800/80 border border-gray-700 rounded-xl p-6 cursor-pointer flex flex-col items-center text-center backdrop-blur-sm";
            card.innerHTML = `
                <div class="text-4xl mb-3">${data.icon}</div>
                <h2 class="text-xl font-bold text-white mb-2">${data.title}</h2>
                <p class="text-gray-400 text-xs leading-relaxed">${data.languages.map(l => l.name).join(', ')}</p>
            `;
            card.onclick = () => openCategory(key);
            categoriesGrid.appendChild(card);
        }

        // 4. Open Category & Setup Language
        function openCategory(categoryKey) {
            currentCategory = categoriesData[categoryKey];
            langSelector.innerHTML = '';
            currentCategory.languages.forEach((lang, index) => {
                const option = document.createElement('option');
                option.value = index; option.innerText = lang.name;
                langSelector.appendChild(option);
            });

            homeScreen.classList.add('hidden');
            editorScreen.classList.remove('hidden');
            setupLanguage(0);
            setTimeout(() => editor.refresh(), 10);
        }

        langSelector.addEventListener('change', (e) => setupLanguage(e.target.value));

        function setupLanguage(index) {
            currentLangConfig = currentCategory.languages[index];
            dynamicSyntax.innerText = `${currentLangConfig.syntax} ${currentLangConfig.name}`;
            
            // Set Mode and enable/disable Linting based on language support
            editor.setOption("mode", currentLangConfig.mode);
            editor.setOption("lint", currentLangConfig.lint); 
            
            editor.setValue("");
            editor.setOption("placeholder", `Start writing ${currentLangConfig.name} code here...`);
            
            if (currentCategory.type === 'web' && ['html', 'css', 'js', 'php'].includes(currentLangConfig.id)) {
                previewFrame.classList.remove('hidden');
                terminalOutput.classList.add('hidden');
                outputLabel.innerText = "Live Web Preview";
            } else {
                previewFrame.classList.add('hidden');
                terminalOutput.classList.remove('hidden');
                outputLabel.innerText = "Terminal Output";
                terminalContent.innerHTML = "";
            }
        }

        document.getElementById('backBtn').addEventListener('click', () => {
            editorScreen.classList.add('hidden');
            homeScreen.classList.remove('hidden');
        });

        // 5. Smart Checker (Terminal Error Detection for Compiled/Backend Languages)
        document.getElementById('checkBtn').addEventListener('click', () => {
            const code = editor.getValue().trim();
            
            if (currentCategory.type === 'web' && ['html', 'css', 'js', 'php'].includes(currentLangConfig.id)) {
                const documentContent = previewFrame.contentDocument || previewFrame.contentWindow.document;
                documentContent.open();
                if (currentLangConfig.id === 'css') {
                    documentContent.write(`<style>${code}</style><div style="padding:20px; font-family:sans-serif;"><h1>CSS Preview Active</h1><p>Your styles are applied to this document.</p></div>`);
                } else if (currentLangConfig.id === 'js' || currentLangConfig.id === 'ts') {
                    documentContent.write(`<script>try { ${code} } catch(e) { document.body.innerHTML += '<div style="color:red; font-family:monospace;">❌ Error: ' + e.message + '</div>'; }<\/script>`);
                } else {
                    documentContent.write(code); // For HTML & PHP
                }
                documentContent.close();
            } else {
                terminalContent.innerHTML = `<div class="text-blue-400">> Running ${currentLangConfig.name} code...</div>`;
                
                setTimeout(() => {
                    if (code.length === 0) {
                        terminalContent.innerHTML += `<div class="text-red-400 mt-2 border-l-4 border-red-500 pl-2">❌ <b>Compilation Error:</b> Code is completely empty. Please write some logic.</div>`;
                        return;
                    }

                    // Simulated Terminal Error Checks
                    let hasError = false;
                    let errorMsg = "";

                    // Check for missing semicolons in C-style languages
                    if (['c', 'cpp', 'java', 'csharp', 'rust', 'go', 'php', 'dart', 'sql', 'plsql'].includes(currentLangConfig.ext) || currentLangConfig.ext.includes('c')) {
                        if (!code.includes(";") && code.length > 5) {
                            hasError = true;
                            errorMsg = `SyntaxError: Expected ';' at the end of declaration.`;
                        }
                    }
                    
                    // Check for empty blocks {}
                    if (code.includes("{}")) {
                        hasError = true;
                        errorMsg = `Warning: Empty block statement '{}' detected.`;
                    }

                    // Check for unclosed brackets
                    const openBrackets = (code.match(/\{/g) || []).length;
                    const closeBrackets = (code.match(/\}/g) || []).length;
                    if (openBrackets !== closeBrackets) {
                        hasError = true;
                        errorMsg = `SyntaxError: Mismatched brackets. Expected '}' to close block.`;
                    }

                    if (hasError) {
                        // Display error with Red Line effect in terminal
                        terminalContent.innerHTML += `
                            <div class="text-red-400 mt-2 bg-red-900/20 p-3 rounded border border-red-800">
                                ❌ <b>Terminal Error:</b><br>
                                <span class="text-red-300" style="text-decoration: underline wavy red;">${errorMsg}</span>
                            </div>
                            <div class="text-gray-500 mt-2 text-xs">Fix the errors above and try again.</div>
                        `;
                    } else {
                        terminalContent.innerHTML += `<div class="text-green-400 mt-2 bg-green-900/30 p-2 rounded">✅ <b>Success:</b> Syntax looks correct. No obvious errors found.</div>`;
                    }
                }, 500);
            }
        });

        // 6. Clear & Download
        document.getElementById('clearBtn').addEventListener('click', () => {
            editor.setValue("");
            previewFrame.srcdoc = "";
            terminalContent.innerHTML = "";
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const code = editor.getValue();
            if(!code.trim()) return alert("Bhai, editor khali hai. Pehle code likho!");
            const blob = new Blob([code], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `script.${currentLangConfig.ext}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
