<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap to Earn</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background: #1e1e1e; 
            color: white; 
            margin-top: 50px; 
            user-select: none; /* Text selection बंद करने के लिए */
        }
        .coin { 
            width: 150px; 
            height: 150px; 
            background: linear-gradient(135deg, #ffd700, #ff8c00); 
            border-radius: 50%; 
            display: inline-block; 
            line-height: 150px; 
            font-size: 24px; 
            color: black; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: transform 0.1s; 
        }
        .coin:active { 
            transform: scale(0.90); /* टैप करने पर कॉइन दबेगा */
        }
        button { 
            margin-top: 40px; 
            padding: 12px 24px; 
            font-size: 18px; 
            background: #0088cc; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>Tap & Earn Crypto</h2>
    <p style="font-size: 20px;">Score: <span id="score">0</span></p>
    
    <div class="coin" onclick="tapCoin()">TAP ME</div>
    <br>
    
    <button onclick="saveAndExit()">Save & Exit</button>

    <script>
        // Telegram Web App को Initialize करना
        let tg = window.Telegram.WebApp;
        tg.expand(); // मिनी ऐप को फुल स्क्रीन में खोलने के लिए

        let score = 0;

        function tapCoin() {
            score++;
            document.getElementById("score").innerText = score;
            // टैप करने पर मोबाइल में वाइब्रेशन (Haptic Feedback) फील होगा
            tg.HapticFeedback.impactOccurred('light');
        }

        function saveAndExit() {
            // Telegram Bot को वापस स्कोर का डेटा भेजना
            let data = JSON.stringify({ finalScore: score });
            tg.sendData(data); // यह ऐप को बंद कर देगा और बॉट को डेटा भेज देगा
        }
    </script>
</body>
</html>
