<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Online Code Editor</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-darker.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/display/placeholder.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/sql/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/shell/shell.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .CodeMirror {
            height: 100%;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            font-size: 15px;
        }
        .CodeMirror-empty.CodeMirror-focused { opacity: 0.6; }
        .CodeMirror-pre.CodeMirror-empty { color: #888; }
        
        /* Home Screen Card Animations */
        .category-card {
            transition: all 0.3s ease;
        }
        .category-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 30px -5px rgba(59, 130, 246, 0.4);
            border-color: #3b82f6;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col overflow-hidden">

    <div id="homeScreen" class="w-full h-full overflow-y-auto p-6 md:p-10 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-gray-800 via-gray-900 to-black">
        <div class="max-w-6xl mx-auto">
            <header class="text-center mb-16 mt-8">
                <h1 class="text-5xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 mb-4 drop-shadow-lg">
                    {'</>'} CodePlay Studio
                </h1>
                <p class="text-gray-400 text-xl">Choose your development field to start coding</p>
            </header>

            <div id="categoriesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </div>
    </div>

    <div id="editorScreen" class="w-full h-full flex flex-col hidden">
        
        <header class="bg-gray-800 border-b border-gray-700 p-3 flex flex-wrap items-center justify-between gap-3 shadow-md">
            <div class="flex items-center gap-4">
                <button id="backBtn" class="text-gray-400 hover:text-white transition-colors flex items-center gap-1 bg-gray-700 px-3 py-1.5 rounded-md hover:bg-gray-600">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back
                </button>
                
                <div class="h-6 w-px bg-gray-600 hidden md:block"></div>
                
                <h1 id="dynamicSyntax" class="text-lg md:text-xl font-bold tracking-wider text-blue-400">
                    {'</>'} CodePlay
                </h1>
            </div>
            
            <div class="flex flex-wrap items-center gap-2 md:gap-3">
                <select id="langSelector" class="bg-gray-700 border border-gray-600 text-white text-sm rounded-md focus:ring-blue-500 focus:border-blue-500 block p-2 cursor-pointer transition-colors outline-none font-semibold">
                    </select>

                <button id="checkBtn" class="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-md text-sm font-semibold transition-colors flex items-center gap-1 shadow-sm">
                    ▶ Run
                </button>
                <button id="clearBtn" class="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-md text-sm font-semibold transition-colors flex items-center gap-1 shadow-sm">
                    ✖ Clear
                </button>
                <button id="downloadBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-md text-sm font-semibold transition-colors flex items-center gap-1 shadow-sm">
                    ↓ Save
                </button>
            </div>
        </header>

        <main class="flex-1 flex flex-col lg:flex-row w-full h-full overflow-hidden">
            <section class="w-full lg:w-1/2 h-1/2 lg:h-full border-b lg:border-b-0 lg:border-r border-gray-700 relative">
                <textarea id="codeEditor"></textarea>
            </section>

            <section class="w-full lg:w-1/2 h-1/2 lg:h-full relative bg-gray-100 flex flex-col">
                <div id="outputLabel" class="absolute top-0 right-0 bg-gray-800 text-gray-200 text-xs px-3 py-1 rounded-bl-md z-10 font-bold opacity-90 shadow-sm border-l border-b border-gray-700 pointer-events-none">
                    Live Preview
                </div>
                
                <iframe id="previewFrame" class="w-full h-full border-none bg-white"></iframe>
                
                <div id="terminalOutput" class="w-full h-full bg-gray-950 text-green-400 p-4 font-mono text-sm overflow-y-auto hidden">
                    <div class="text-gray-500 mb-4 border-b border-gray-800 pb-2">Terminal Ready...</div>
                    <div id="terminalContent" class="space-y-2"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // 1. Data Structure with Icons and Categories
        const categoriesData = {
            "web": {
                title: "Web Development", icon: "🌐", type: "web",
                languages: [
                    { id: "html", name: "HTML", mode: "htmlmixed", syntax: "</>", ext: "html" },
                    { id: "css", name: "CSS", mode: "css", syntax: "{;}", ext: "css" },
                    { id: "js", name: "JavaScript", mode: "javascript", syntax: "JS", ext: "js" }
                ]
            },
            "software": {
                title: "Software Development", icon: "💻", type: "console",
                languages: [
                    { id: "cpp", name: "C++", mode: "text/x-c++src", syntax: "C++", ext: "cpp" },
                    { id: "java", name: "Java", mode: "text/x-java", syntax: "☕", ext: "java" },
                    { id: "csharp", name: "C#", mode: "text/x-csharp", syntax: "C#", ext: "cs" }
                ]
            },
            "mobile": {
                title: "Mobile Development", icon: "📱", type: "console",
                languages: [
                    { id: "kotlin", name: "Kotlin", mode: "text/x-java", syntax: "Kt", ext: "kt" },
                    { id: "swift", name: "Swift", mode: "text/x-c++src", syntax: "🍎", ext: "swift" },
                    { id: "dart", name: "Dart", mode: "javascript", syntax: "🎯", ext: "dart" }
                ]
            },
            "ai_data": {
                title: "AI & Data Science", icon: "🧠", type: "console",
                languages: [
                    { id: "python", name: "Python", mode: "python", syntax: "Py", ext: "py" },
                    { id: "r", name: "R Language", mode: "python", syntax: "R", ext: "r" }
                ]
            },
            "database": {
                title: "Database Languages", icon: "🗄️", type: "console",
                languages: [
                    { id: "sql", name: "SQL", mode: "sql", syntax: "SQL", ext: "sql" }
                ]
            },
            "scripting": {
                title: "Scripting & Automation", icon: "⚙️", type: "console",
                languages: [
                    { id: "bash", name: "Bash / Shell", mode: "shell", syntax: "$_", ext: "sh" }
                ]
            },
            "game": {
                title: "Game Development", icon: "🎮", type: "console",
                languages: [
                    { id: "cpp_ue", name: "C++ (Unreal)", mode: "text/x-c++src", syntax: "UE", ext: "cpp" },
                    { id: "cs_unity", name: "C# (Unity)", mode: "text/x-csharp", syntax: "Unity", ext: "cs" }
                ]
            }
        };

        let currentCategory = null;
        let currentLangConfig = null;

        // 2. Initialize CodeMirror
        const editorElement = document.getElementById('codeEditor');
        const editor = CodeMirror.fromTextArea(editorElement, {
            mode: 'htmlmixed', theme: 'material-darker', lineNumbers: true, indentUnit: 4
        });

        // DOM Elements
        const homeScreen = document.getElementById('homeScreen');
        const editorScreen = document.getElementById('editorScreen');
        const categoriesGrid = document.getElementById('categoriesGrid');
        const langSelector = document.getElementById('langSelector');
        const dynamicSyntax = document.getElementById('dynamicSyntax');
        const previewFrame = document.getElementById('previewFrame');
        const terminalOutput = document.getElementById('terminalOutput');
        const terminalContent = document.getElementById('terminalContent');
        const outputLabel = document.getElementById('outputLabel');

        // 3. Render Home Screen Cards
        for (const [key, data] of Object.entries(categoriesData)) {
            const card = document.createElement('div');
            card.className = "category-card bg-gray-800/80 border border-gray-700 rounded-xl p-6 cursor-pointer flex flex-col items-center text-center backdrop-blur-sm";
            card.innerHTML = `
                <div class="text-5xl mb-4">${data.icon}</div>
                <h2 class="text-2xl font-bold text-white mb-2">${data.title}</h2>
                <p class="text-gray-400 text-sm">${data.languages.map(l => l.name).join(', ')}</p>
            `;
            card.onclick = () => openCategory(key);
            categoriesGrid.appendChild(card);
        }

        // 4. Open Category & Setup Dropdown
        function openCategory(categoryKey) {
            currentCategory = categoriesData[categoryKey];
            
            // Populate Dropdown
            langSelector.innerHTML = '';
            currentCategory.languages.forEach((lang, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.innerText = lang.name;
                langSelector.appendChild(option);
            });

            // Switch Screen
            homeScreen.classList.add('hidden');
            editorScreen.classList.remove('hidden');
            
            // Trigger language setup for the first item
            setupLanguage(0);
            
            setTimeout(() => editor.refresh(), 10); // Fix UI glitch
        }

        // Dropdown change event
        langSelector.addEventListener('change', (e) => {
            setupLanguage(e.target.value);
        });

        function setupLanguage(index) {
            currentLangConfig = currentCategory.languages[index];
            
            // Update UI
            dynamicSyntax.innerText = `${currentLangConfig.syntax} ${currentLangConfig.name}`;
            editor.setOption("mode", currentLangConfig.mode);
            editor.setValue("");
            editor.setOption("placeholder", `Start writing ${currentLangConfig.name} code here...`);
            
            // Switch Output Window
            if (currentCategory.type === 'web') {
                previewFrame.classList.remove('hidden');
                terminalOutput.classList.add('hidden');
                outputLabel.innerText = "Live Web Preview";
            } else {
                previewFrame.classList.add('hidden');
                terminalOutput.classList.remove('hidden');
                outputLabel.innerText = "Smart Terminal";
                terminalContent.innerHTML = "";
            }
        }

        document.getElementById('backBtn').addEventListener('click', () => {
            editorScreen.classList.add('hidden');
            homeScreen.classList.remove('hidden');
            terminalContent.innerHTML = "";
            previewFrame.srcdoc = "";
        });

        // 5. Smart Checker & Run Logic
        document.getElementById('checkBtn').addEventListener('click', () => {
            const code = editor.getValue().trim();
            
            if (currentCategory.type === 'web') {
                // Web Preview Logic
                const documentContent = previewFrame.contentDocument || previewFrame.contentWindow.document;
                documentContent.open();
                if (currentLangConfig.id === 'css') {
                    documentContent.write(`<style>${code}</style><div style="padding:20px; font-family:sans-serif;"><h1>CSS Preview Active</h1><p>Your styles are applied to this document.</p></div>`);
                } else if (currentLangConfig.id === 'js') {
                    documentContent.write(`<script>try { ${code} } catch(e) { document.write('<span style="color:red">JS Error: ' + e.message + '</span>'); }<\/script>`);
                } else {
                    documentContent.write(code);
                }
                documentContent.close();
            } else {
                // Smart Terminal Logic for Backend/Console Languages
                terminalContent.innerHTML = `<div class="text-blue-400">> Running ${currentLangConfig.name} script...</div>`;
                
                setTimeout(() => {
                    if (code.length === 0) {
                        terminalContent.innerHTML += `<div class="text-red-400 mt-2">❌ Error: Code is empty! Bhai, thoda code toh likho.</div>`;
                        return;
                    }

                    let status = "success";
                    let message = "Perfect! Code structure looks solid. ✅ Tum sahi jaa rahe ho!";
                    
                    // Basic Heuristic Checks (Fake AI-like checking)
                    if (currentLangConfig.id === 'python' && !(/print|def|import|class|for|if/i.test(code))) {
                        status = "warning";
                        message = "⚠️ Warning: Yeh code thoda incomplete lag raha hai. Basic syntax check karo.";
                    } else if ((currentLangConfig.id === 'cpp' || currentLangConfig.id === 'java' || currentLangConfig.id === 'csharp') && !code.includes(";")) {
                        status = "error";
                        message = "❌ Error: Are you missing a semicolon (;)? C/Java based languages me zaruri hota hai!";
                    } else if (code.length < 10) {
                        status = "warning";
                        message = "⚠️ Note: Code bahut chhota hai, but syntax theek lag raha hai. Keep going!";
                    }

                    // Display Result
                    if (status === "success") {
                        terminalContent.innerHTML += `<div class="text-green-400 mt-2 bg-green-900/30 p-2 rounded">${message}</div>`;
                    } else if (status === "warning") {
                        terminalContent.innerHTML += `<div class="text-yellow-400 mt-2 bg-yellow-900/30 p-2 rounded">${message}</div>`;
                    } else {
                        terminalContent.innerHTML += `<div class="text-red-400 mt-2 bg-red-900/30 p-2 rounded">${message}</div>`;
                    }
                    
                    terminalContent.innerHTML += `<div class="text-gray-500 mt-4 text-xs italic">* Note: Direct compilation is disabled in browser. Use 'Save' to run locally.</div>`;
                }, 600); // 600ms fake delay to look like it's processing
            }
        });

        // 6. Clear & Download
        document.getElementById('clearBtn').addEventListener('click', () => {
            editor.setValue("");
            previewFrame.srcdoc = "";
            terminalContent.innerHTML = "";
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const code = editor.getValue();
            if(!code.trim()) { alert("Editor empty hai bhai!"); return; }
            const blob = new Blob([code], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `script.${currentLangConfig.ext}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
