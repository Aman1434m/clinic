<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeForge — AI-Powered Editor</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/display/placeholder.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closetag.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/comment/comment.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/selection/active-line.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldgutter.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/foldgutter.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/brace-fold.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/xml-fold.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/fold/indent-fold.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/search/search.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/dialog/dialog.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/dialog/dialog.min.css">

<script src="https://unpkg.com/jshint@2.13.6/dist/jshint.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/lint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/javascript-lint.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/go/go.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/rust/rust.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/php/php.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/swift/swift.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-0: #0a0b0d;
    --bg-1: #111318;
    --bg-2: #181c22;
    --bg-3: #1f242d;
    --bg-hover: #252b36;
    --border: #2a3040;
    --border-bright: #3a4455;
    --accent: #00d4aa;
    --accent-dim: #00a884;
    --accent-glow: rgba(0, 212, 170, 0.15);
    --accent2: #ff6b6b;
    --accent3: #ffd93d;
    --text-0: #e8eaf0;
    --text-1: #a8b2c4;
    --text-2: #6b7894;
    --text-3: #3d4a60;
    --font-mono: 'JetBrains Mono', monospace;
    --font-ui: 'Syne', sans-serif;
    --radius: 6px;
    --transition: 0.15s ease;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-0);
    color: var(--text-0);
    font-family: var(--font-ui);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ─── HEADER ─── */
  .header {
    height: 48px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 50;
  }

  .logo {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text-0);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .logo span { color: var(--accent); }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: all var(--transition);
    white-space: nowrap;
  }

  .btn-ghost {
    background: transparent;
    color: var(--text-1);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--bg-hover); color: var(--text-0); border-color: var(--border-bright); }

  .btn-accent {
    background: var(--accent);
    color: #0a0b0d;
  }
  .btn-accent:hover { background: #00e8bb; box-shadow: 0 0 20px var(--accent-glow); }

  .btn-danger {
    background: transparent;
    color: var(--accent2);
    border: 1px solid rgba(255,107,107,0.3);
  }
  .btn-danger:hover { background: rgba(255,107,107,0.1); }

  /* ─── LANG SELECTOR ─── */
  .lang-select {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text-0);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    outline: none;
    transition: all var(--transition);
  }
  .lang-select:hover, .lang-select:focus { border-color: var(--accent); }

  /* ─── MAIN LAYOUT ─── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ─── SIDEBAR ─── */
  .sidebar {
    width: 48px;
    background: var(--bg-1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0;
    gap: 4px;
    flex-shrink: 0;
  }

  .sidebar-btn {
    width: 36px;
    height: 36px;
    border-radius: var(--radius);
    border: none;
    background: transparent;
    color: var(--text-2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    font-size: 16px;
    position: relative;
  }
  .sidebar-btn:hover { background: var(--bg-hover); color: var(--text-0); }
  .sidebar-btn.active { background: var(--accent-glow); color: var(--accent); }
  .sidebar-btn::after {
    content: attr(data-tip);
    position: absolute;
    left: 48px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    color: var(--text-0);
    font-family: var(--font-ui);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s;
    z-index: 100;
  }
  .sidebar-btn:hover::after { opacity: 1; }

  /* ─── EDITOR AREA ─── */
  .editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  .editor-tabs {
    height: 36px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 2px;
    flex-shrink: 0;
    overflow-x: auto;
  }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 12px;
    height: 28px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-2);
    transition: all var(--transition);
    white-space: nowrap;
    border: 1px solid transparent;
    background: transparent;
    user-select: none;
  }
  .tab:hover { color: var(--text-1); background: var(--bg-hover); }
  .tab.active { color: var(--accent); background: var(--accent-glow); border-color: rgba(0,212,170,0.2); }

  .tab-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .editor-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .CodeMirror {
    height: 100% !important;
    font-family: var(--font-mono) !important;
    font-size: 13.5px !important;
    line-height: 1.7 !important;
    background: var(--bg-0) !important;
  }

  .CodeMirror-scroll { padding-bottom: 20px; }

  /* Line numbers style fix */
  .CodeMirror-gutters { background: var(--bg-1) !important; border-right: 1px solid var(--border) !important; }
  .CodeMirror-linenumber { color: var(--text-3) !important; padding: 0 10px !important; }
  .CodeMirror-activeline-background { background: rgba(255,255,255,0.03) !important; }

  /* ─── BOTTOM PANEL ─── */
  .bottom-panel {
    height: 160px;
    background: var(--bg-1);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: height 0.2s ease;
  }
  .bottom-panel.collapsed { height: 36px; }

  .panel-header {
    height: 36px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
  }
  .panel-header:hover { background: var(--bg-hover); }

  .panel-title { font-size: 11px; font-weight: 600; color: var(--text-1); letter-spacing: 1px; text-transform: uppercase; }

  .panel-body { flex: 1; overflow-y: auto; padding: 8px 12px; font-family: var(--font-mono); font-size: 12px; line-height: 1.6; }

  .log-entry { display: flex; gap: 10px; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .log-time { color: var(--text-3); flex-shrink: 0; }
  .log-info { color: var(--text-1); }
  .log-warn { color: var(--accent3); }
  .log-error { color: var(--accent2); }
  .log-success { color: var(--accent); }

  /* ─── RIGHT PANEL ─── */
  .right-panel {
    width: 340px;
    background: var(--bg-1);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: width 0.2s ease;
  }
  .right-panel.collapsed { width: 0; overflow: hidden; border: none; }

  .right-tabs {
    height: 36px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-shrink: 0;
  }

  .right-tab {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-2);
    border-bottom: 2px solid transparent;
    transition: all var(--transition);
    gap: 5px;
    user-select: none;
  }
  .right-tab:hover { color: var(--text-0); background: var(--bg-hover); }
  .right-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ─── PREVIEW ─── */
  #preview-container {
    flex: 1;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  #preview-container.active { display: flex; }

  .preview-toolbar {
    padding: 6px 10px;
    display: flex;
    gap: 6px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    flex-shrink: 0;
  }

  .preview-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  #preview-frame {
    flex: 1;
    border: none;
    background: white;
  }

  /* ─── AI AGENT PANEL ─── */
  #ai-container {
    flex: 1;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  #ai-container.active { display: flex; }

  .ai-chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .ai-chat::-webkit-scrollbar { width: 4px; }
  .ai-chat::-webkit-scrollbar-track { background: transparent; }
  .ai-chat::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  .msg {
    max-width: 90%;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 12.5px;
    line-height: 1.6;
    animation: msgIn 0.2s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }

  .msg-user {
    background: var(--accent-glow);
    border: 1px solid rgba(0,212,170,0.2);
    color: var(--text-0);
    align-self: flex-end;
    font-family: var(--font-ui);
  }

  .msg-ai {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text-0);
    align-self: flex-start;
    font-family: var(--font-mono);
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg-ai code {
    background: var(--bg-0);
    padding: 2px 5px;
    border-radius: 3px;
    color: var(--accent);
  }

  .ai-welcome {
    align-self: center;
    text-align: center;
    padding: 20px;
    color: var(--text-2);
    font-size: 12px;
    font-family: var(--font-ui);
  }

  .ai-welcome h3 {
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 8px;
    font-weight: 700;
  }

  /* File chips */
  .file-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 6px 10px;
    border-top: 1px solid var(--border);
    min-height: 32px;
  }

  .file-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--bg-3);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 10.5px;
    font-family: var(--font-mono);
    color: var(--text-1);
    max-width: 140px;
  }

  .file-chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .file-chip-remove {
    background: none;
    border: none;
    color: var(--text-2);
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
    padding: 0;
    flex-shrink: 0;
  }
  .file-chip-remove:hover { color: var(--accent2); }

  /* AI input area */
  .ai-input-area {
    border-top: 1px solid var(--border);
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }

  .ai-input-row {
    display: flex;
    gap: 6px;
    align-items: flex-end;
  }

  .ai-input {
    flex: 1;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-0);
    font-family: var(--font-ui);
    font-size: 12.5px;
    padding: 8px 10px;
    resize: none;
    outline: none;
    transition: border-color var(--transition);
    min-height: 38px;
    max-height: 100px;
    line-height: 1.5;
  }
  .ai-input:focus { border-color: var(--accent); }
  .ai-input::placeholder { color: var(--text-3); }

  .ai-toolbar {
    display: flex;
    gap: 6px;
    align-items: center;
    padding: 0 2px;
  }

  .upload-btn-label {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 10px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    color: var(--text-1);
    font-size: 11px;
    font-family: var(--font-ui);
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
    background: transparent;
    user-select: none;
  }
  .upload-btn-label:hover { border-color: var(--accent); color: var(--accent); }

  #file-upload { display: none; }

  .context-badge {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-3);
    font-family: var(--font-mono);
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 12px;
    align-self: flex-start;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ─── RESIZE HANDLE ─── */
  .resize-handle {
    width: 4px;
    background: transparent;
    cursor: col-resize;
    transition: background var(--transition);
    flex-shrink: 0;
  }
  .resize-handle:hover, .resize-handle.dragging { background: var(--accent); }

  /* ─── STATUS BAR ─── */
  .status-bar {
    height: 22px;
    background: var(--accent);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 16px;
    flex-shrink: 0;
  }

  .status-item {
    font-size: 10.5px;
    font-family: var(--font-mono);
    color: #0a0b0d;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #0a0b0d;
    opacity: 0.5;
  }

  /* ─── SCROLLBARS ─── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

  /* ─── AI CODE BLOCK ─── */
  .ai-code-block {
    background: var(--bg-0);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    margin: 4px 0;
    overflow: hidden;
  }

  .ai-code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 10px;
    background: var(--bg-3);
    border-bottom: 1px solid var(--border);
  }

  .ai-code-lang { font-size: 10px; color: var(--accent); font-family: var(--font-mono); }

  .ai-code-apply {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    font-family: var(--font-ui);
    font-weight: 600;
    transition: all var(--transition);
  }
  .ai-code-apply:hover { background: var(--accent); color: #0a0b0d; }

  .ai-code-content {
    padding: 10px;
    font-size: 11.5px;
    line-height: 1.6;
    color: var(--text-0);
    overflow-x: auto;
    white-space: pre;
  }

  /* Lint error gutter */
  .CodeMirror-lint-marker-error, .CodeMirror-lint-marker-warning {
    font-size: 10px;
  }

  /* ─── EMPTY STATE ─── */
  .empty-chat {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    padding: 20px;
    text-align: center;
  }

  .empty-icon {
    font-size: 32px;
    opacity: 0.4;
  }

  .empty-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-1);
  }

  .empty-sub {
    font-size: 11px;
    color: var(--text-2);
    line-height: 1.6;
    max-width: 220px;
  }

  .quick-prompts {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 8px;
    width: 100%;
  }

  .quick-prompt {

</head>

<script>
// ─── GLOBAL STATE ─────────────────────────────────────────────────────────────
let editor;
let uploadedFiles = []; // { name, content, type }
let chatHistory = [];
let consoleVisible = true;
let rightPanelVisible = true;
let currentRightTab = 'ai';
let isAILoading = false;

// ─── LANGUAGE CONFIG ──────────────────────────────────────────────────────────
const LANG_CONFIG = {
  'htmlmixed':       { label: 'HTML',       ext: 'index.html', dot: '#e44d26', cm: 'htmlmixed'  },
  'css':             { label: 'CSS',        ext: 'style.css',  dot: '#2196f3', cm: 'css'        },
  'javascript':      { label: 'JavaScript', ext: 'main.js',    dot: '#f7df1e', cm: 'javascript' },
  'python':          { label: 'Python',     ext: 'main.py',    dot: '#3572a5', cm: 'python'     },
  'text/x-java':     { label: 'Java',       ext: 'Main.java',  dot: '#b07219', cm: 'text/x-java'},
  'text/x-csrc':     { label: 'C',          ext: 'main.c',     dot: '#555555', cm: 'text/x-csrc'},
  'text/x-c++src':   { label: 'C++',        ext: 'main.cpp',   dot: '#f34b7d', cm: 'text/x-c++src'},
  'text/x-csharp':   { label: 'C#',         ext: 'Program.cs', dot: '#178600', cm: 'text/x-csharp'},
  'go':              { label: 'Go',         ext: 'main.go',    dot: '#00add8', cm: 'go'         },
  'rust':            { label: 'Rust',       ext: 'main.rs',    dot: '#dea584', cm: 'rust'       },
  'text/x-php':      { label: 'PHP',        ext: 'index.php',  dot: '#4f5d95', cm: 'text/x-php' },
  'swift':           { label: 'Swift',      ext: 'main.swift', dot: '#fa7343', cm: 'swift'      },
};

// ─── STARTER CODE TEMPLATES ───────────────────────────────────────────────────
const TEMPLATES = {
  'htmlmixed': `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Page</title>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
    h1 { color: #333; }
  </style>
</head>
<body>
  <h1>Hello, World!</h1>
  <p>Edit me and click Run ▶</p>
  <script>
    console.log('Page loaded!');
  <\/script>
</body>
</html>`,
  'javascript': `// JavaScript playground
function greet(name) {
  return \`Hello, \${name}! Welcome to CodeForge.\`;
}

const result = greet('World');
console.log(result);

// Array methods
const numbers = [1, 2, 3, 4, 5];
const doubled = numbers.map(n => n * 2);
console.log('Doubled:', doubled);`,
  'python': `# Python playground
def greet(name: str) -> str:
    return f"Hello, {name}! Welcome to CodeForge."

result = greet("World")
print(result)

# List comprehension
numbers = [1, 2, 3, 4, 5]
doubled = [n * 2 for n in numbers]
print("Doubled:", doubled)`,
  'css': `/* CSS Playground */
:root {
  --primary: #00d4aa;
  --bg: #0a0b0d;
  --text: #e8eaf0;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  margin: 0;
}

.card {
  background: #181c22;
  border: 1px solid #2a3040;
  border-radius: 12px;
  padding: 40px;
  text-align: center;
}`,
};

// ─── INIT CODEMIRROR ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
    mode: 'javascript',
    theme: 'material-darker',
    lineNumbers: true,
    lineWrapping: false,
    indentUnit: 2,
    tabSize: 2,
    smartIndent: true,
    matchBrackets: true,
    autoCloseBrackets: true,
    autoCloseTags: true,
    styleActiveLine: true,
    foldGutter: true,
    gutters: ['CodeMirror-linenumbers', 'CodeMirror-foldgutter', 'CodeMirror-lint-markers'],
    extraKeys: {
      'Ctrl-/': 'toggleComment',
      'Cmd-/': 'toggleComment',
      'Ctrl-Enter': runCode,
      'Cmd-Enter': runCode,
      'Ctrl-S': () => { runCode(); return false; },
      'Cmd-S': () => { runCode(); return false; },
    },
    placeholder: '// Start coding here...',
  });

  // Set default content
  editor.setValue(TEMPLATES['javascript']);
  editor.refresh();

  // Cursor position tracking
  editor.on('cursorActivity', updateCursorStatus);
  editor.on('change', updateCharCount);

  // Language change
  document.getElementById('lang-select').addEventListener('change', e => {
    switchLanguage(e.target.value);
  });

  // File upload handler
  document.getElementById('file-upload').addEventListener('change', handleFileUpload);

  updateCursorStatus();
  updateCharCount();
  logConsole('success', '▸ CodeForge v2.0 initialized. Happy coding!');
  logConsole('info', 'Tip: Press Ctrl+Enter to run • Ctrl+/ to comment • Ctrl+S to save & run');
});

// ─── LANGUAGE SWITCH ──────────────────────────────────────────────────────────
function switchLanguage(mode) {
  const cfg = LANG_CONFIG[mode];
  if (!cfg) return;

  editor.setOption('mode', mode);
  document.getElementById('status-lang').textContent = cfg.label;
  document.getElementById('tab-editor').innerHTML =
    `<span class="tab-dot" style="background:${cfg.dot}"></span>${cfg.ext}`;

  // Enable lint only for JS
  if (mode === 'javascript' && typeof JSHINT !== 'undefined') {
    editor.setOption('lint', { esversion: 11 });
  } else {
    editor.setOption('lint', false);
  }

  // Load template if editor is empty or has default template
  const current = editor.getValue().trim();
  const isDefault = Object.values(TEMPLATES).some(t => t.trim() === current);
  if (!current || isDefault) {
    editor.setValue(TEMPLATES[mode] || '');
  }

  editor.refresh();
  logConsole('info', `Language switched to ${cfg.label}`);
}

// ─── STATUS BAR ───────────────────────────────────────────────────────────────
function updateCursorStatus() {
  const cur = editor.getCursor();
  document.getElementById('status-cursor').textContent = `Ln ${cur.line + 1}, Col ${cur.ch + 1}`;
}

function updateCharCount() {
  const len = editor.getValue().length;
  document.getElementById('status-chars').textContent = `${len.toLocaleString()} chars`;
}

// ─── TOOLBAR ACTIONS ──────────────────────────────────────────────────────────
function runCode() {
  const mode = document.getElementById('lang-select').value;
  const code = editor.getValue();

  if (mode === 'htmlmixed') {
    // Render in iframe
    const frame = document.getElementById('preview-frame');
    frame.srcdoc = code;
    switchRightTab('preview');
    logConsole('success', '▸ Preview updated');
  } else if (mode === 'css') {
    // Wrap CSS in an HTML page for preview
    const html = `<!DOCTYPE html><html><head><style>${code}</style></head>
      <body><div class="card"><h2>Preview</h2><p>Your CSS is applied here.</p></div></body></html>`;
    document.getElementById('preview-frame').srcdoc = html;
    switchRightTab('preview');
    logConsole('success', '▸ CSS preview updated');
  } else if (mode === 'javascript') {
    // Capture console output
    runJavaScript(code);
  } else {
    logConsole('warn', `⚠ Live execution not available for ${LANG_CONFIG[mode]?.label || mode}. Use the AI Agent to analyze or run your code.`);
  }

  setStatus('Code executed');
}

function runJavaScript(code) {
  const logs = [];
  const origConsole = {
    log:   console.log,
    warn:  console.warn,
    error: console.error,
    info:  console.info,
  };

  // Patch console
  const patchConsole = (type) => (...args) => {
    const msg = args.map(a => {
      try { return typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a); }
      catch(e) { return String(a); }
    }).join(' ');
    logs.push({ type, msg });
    origConsole[type](...args);
  };

  console.log   = patchConsole('log');
  console.warn  = patchConsole('warn');
  console.error = patchConsole('error');
  console.info  = patchConsole('info');

  let errMsg = null;
  try {
    // eslint-disable-next-line no-new-func
    const fn = new Function(code);
    fn();
  } catch(e) {
    errMsg = e.toString();
    logs.push({ type: 'error', msg: `Runtime Error: ${errMsg}` });
  } finally {
    console.log   = origConsole.log;
    console.warn  = origConsole.warn;
    console.error = origConsole.error;
    console.info  = origConsole.info;
  }

  if (logs.length === 0) {
    logConsole('success', '▸ Executed — no output');
  } else {
    logs.forEach(l => {
      const t = l.type === 'log' ? 'info' : l.type;
      logConsole(t, l.msg);
    });
  }

  if (!errMsg) logConsole('success', `▸ Done (${logs.length} log${logs.length!==1?'s':''})`);
}

function formatCode() {
  const code = editor.getValue();
  const mode = document.getElementById('lang-select').value;
  if (mode === 'javascript') {
    try {
      // Simple JS formatter using Function constructor check
      // Just re-indent based on brackets
      editor.execCommand('selectAll');
      logConsole('info', 'Format: For full formatting, use the AI Agent → "Format my code"');
    } catch(e) {}
  }
  setStatus('Formatted');
  logConsole('info', '⎙ Tip: Ask the AI Agent to format & clean your code for best results.');
}

function copyCode() {
  const code = editor.getValue();
  if (!code.trim()) { logConsole('warn', 'Nothing to copy'); return; }
  navigator.clipboard.writeText(code).then(() => {
    setStatus('Copied!');
    logConsole('success', '⎘ Code copied to clipboard');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = code;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    setStatus('Copied!');
    logConsole('success', '⎘ Code copied to clipboard');
  });
}

function clearCode() {
  if (editor.getValue() && !confirm('Clear all code?')) return;
  editor.setValue('');
  logConsole('warn', '✕ Editor cleared');
  setStatus('Cleared');
}

// ─── CONSOLE ──────────────────────────────────────────────────────────────────
function logConsole(type, message) {
  const out = document.getElementById('console-output');
  const now = new Date();
  const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-time">${time}</span><span class="log-${type}" style="word-break:break-word;flex:1">${escapeHtml(message)}</span>`;
  out.appendChild(entry);
  out.scrollTop = out.scrollHeight;

  // Error counter
  const errors = out.querySelectorAll('.log-error').length;
  document.getElementById('error-count').textContent = errors > 0 ? `${errors} error${errors>1?'s':''}` : '';
}

function toggleConsole() {
  consoleVisible = !consoleVisible;
  const p = document.getElementById('bottom-panel');
  p.classList.toggle('collapsed', !consoleVisible);
}

// ─── VIEWS & PANELS ───────────────────────────────────────────────────────────
function toggleView(view, btn) {
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (view === 'ai') {
    document.getElementById('right-panel').classList.remove('collapsed');
    switchRightTab('ai');
  } else if (view === 'preview') {
    document.getElementById('right-panel').classList.remove('collapsed');
    switchRightTab('preview');
    runCode();
  } else {
    // Toggle right panel
    const rp = document.getElementById('right-panel');
    if (!rp.classList.contains('collapsed')) {
      rp.classList.add('collapsed');
    } else {
      rp.classList.remove('collapsed');
    }
  }
  setTimeout(() => editor.refresh(), 250);
}

function switchRightTab(tab) {
  currentRightTab = tab;
  document.getElementById('rtab-preview').classList.toggle('active', tab === 'preview');
  document.getElementById('rtab-ai').classList.toggle('active', tab === 'ai');
  document.getElementById('preview-container').classList.toggle('active', tab === 'preview');
  document.getElementById('ai-container').classList.toggle('active', tab === 'ai');
}

function switchTab(tab) {
  // For future multi-file support
}

function showShortcuts() {
  const shortcuts = [
    'Ctrl+Enter — Run code',
    'Ctrl+S     — Save & Run',
    'Ctrl+/     — Toggle comment',
    'Ctrl+Z     — Undo',
    'Ctrl+Y     — Redo',
    'Ctrl+F     — Find',
    'Ctrl+H     — Find & Replace',
  ].join('\n');
  logConsole('info', 'Keyboard Shortcuts:\n' + shortcuts);
  if (!consoleVisible) toggleConsole();
}

// ─── STATUS ───────────────────────────────────────────────────────────────────
function setStatus(msg) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  setTimeout(() => { el.textContent = 'Ready'; }, 3000);
}

// ─── FILE UPLOAD ──────────────────────────────────────────────────────────────
function handleFileUpload(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;

  files.forEach(file => {
    if (uploadedFiles.find(f => f.name === file.name)) {
      logConsole('warn', `File "${file.name}" already added`);
      return;
    }

    const reader = new FileReader();
    reader.onload = (ev) => {
      const content = ev.target.result;
      uploadedFiles.push({ name: file.name, content, type: file.type || 'text/plain', size: file.size });
      renderFileChips();
      logConsole('success', `📎 File "${file.name}" uploaded (${formatBytes(file.size)})`);
      updateContextBadge();

      // If it's a code file, offer to load it in editor
      const codeExts = ['.js','.ts','.html','.css','.py','.java','.c','.cpp','.cs','.go','.rs','.php','.swift'];
      const ext = '.' + file.name.split('.').pop().toLowerCase();
      if (codeExts.includes(ext)) {
        logConsole('info', `💡 Tip: Say "Load ${file.name} in the editor" to the AI Agent`);
      }
    };
    reader.onerror = () => logConsole('error', `Failed to read file: ${file.name}`);
    reader.readAsText(file);
  });

  // Reset input so same file can be re-selected
  e.target.value = '';
  hideEmptyState();
}

function renderFileChips() {
  const chips = document.getElementById('file-chips');
  chips.innerHTML = '';
  uploadedFiles.forEach((f, i) => {
    const chip = document.createElement('div');
    chip.className = 'file-chip';
    const icon = getFileIcon(f.name);
    chip.innerHTML = `<span>${icon} ${f.name}</span><button class="file-chip-remove" onclick="removeFile(${i})">×</button>`;
    chips.appendChild(chip);
  });
}

function removeFile(i) {
  const name = uploadedFiles[i].name;
  uploadedFiles.splice(i, 1);
  renderFileChips();
  updateContextBadge();
  logConsole('warn', `Removed file: ${name}`);
}

function updateContextBadge() {
  const el = document.getElementById('context-badge');
  const count = uploadedFiles.length;
  el.textContent = count === 0 ? '0 files' : `${count} file${count>1?'s':''} loaded`;
  el.style.color = count > 0 ? 'var(--accent)' : 'var(--text-3)';
}

function injectEditorContext() {
  const code = editor.getValue().trim();
  if (!code) { logConsole('warn', 'Editor is empty'); return; }
  const lang = document.getElementById('lang-select').value;
  const cfg = LANG_CONFIG[lang] || {};
  const name = cfg.ext || 'editor_code.txt';
  const existing = uploadedFiles.findIndex(f => f.name === name);
  if (existing >= 0) uploadedFiles.splice(existing, 1);
  uploadedFiles.unshift({ name, content: code, type: 'text/plain', fromEditor: true });
  renderFileChips();
  updateContextBadge();
  logConsole('success', `⎀ Editor code added as context (${name})`);
  hideEmptyState();
}

function getFileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const icons = { js:'🟨', ts:'🔷', html:'🟧', css:'💙', py:'🐍', java:'☕', c:'⚙', cpp:'⚙', cs:'💜',
