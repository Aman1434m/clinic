<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web IDE - Online Code Editor</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vsbg: '#1e1e1e',
                        vsnav: '#252526',
                        vsborder: '#333333',
                        vspanel: '#2d2d2d'
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/lint.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jshint/2.13.6/jshint.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/display/placeholder.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/lint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/lint/javascript-lint.min.js"></script>

    <style>
        /* Custom Editor Height Override */
        .CodeMirror {
            height: 100% !important;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 15px;
            background-color: #1e1e1e !important;
        }
        .CodeMirror-empty.CodeMirror-focused { 
            outline: none; 
        }
        .CodeMirror pre.CodeMirror-placeholder { 
            color: #6b7280; 
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
    </style>
</head>
<body class="bg-vsbg text-gray-300 h-screen w-screen overflow-hidden flex flex-col font-sans">

    <nav class="bg-vsnav border-b border-vsborder h-14 flex items-center justify-between px-4 shrink-0 shadow-md">
        <div class="flex items-center space-x-4">
            <h1 class="text-white font-bold text-lg tracking-wide flex items-center gap-2">
                <svg class="w-5 h-5 text-blue-500" fill="currentColor" viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
                Web IDE
            </h1>
            
            <div class="border-l border-gray-600 h-6 mx-2"></div>
            
            <select id="languageSelector" class="bg-vspanel text-sm text-gray-200 rounded border border-vsborder px-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-colors">
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="javascript">JavaScript</option>
            </select>
        </div>

        <div class="flex items-center space-x-3">
            <button id="runBtn" class="bg-green-600 hover:bg-green-500 text-white px-4 py-1.5 rounded text-sm font-medium transition-colors flex items-center gap-1 shadow-sm">
                ▶ Run
            </button>
            <button id="clearBtn" class="bg-vsborder hover:bg-gray-600 text-gray-300 px-4 py-1.5 rounded text-sm font-medium transition-colors">
                Clear
            </button>
            <button id="downloadBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded text-sm font-medium transition-colors flex items-center gap-1 shadow-sm">
                ↓ Download
            </button>
        </div>
    </nav>

    <main class="flex flex-1 overflow-hidden">
        
        <section class="w-1/2 flex flex-col border-r border-vsborder relative">
            
            <div class="bg-vspanel border-b border-vsborder p-2 flex items-center justify-between text-xs text-gray-400 shrink-0">
                <div class="flex items-center space-x-2">
                    <label for="fileUpload" class="cursor-pointer bg-vsbg border border-vsborder hover:bg-vsborder px-3 py-1 rounded transition-colors text-gray-200">
                        + Upload Project Files
                    </label>
                    <input type="file" id="fileUpload" multiple accept=".html,.css,.js" class="hidden">
                    <span id="uploadStatus" class="italic hidden">Files loaded. Click Run!</span>
                </div>
                <div class="flex items-center">
                    <span class="bg-yellow-600/20 text-yellow-500 px-2 py-0.5 rounded text-[10px] uppercase font-bold tracking-wider">JSHint Active</span>
                </div>
            </div>

            <div class="flex-1 relative bg-vsbg">
                <textarea id="editor"></textarea>
            </div>
        </section>

        <section class="w-1/2 flex flex-col bg-white">
            <div class="bg-gray-100 border-b border-gray-300 h-8 flex items-center px-4 text-xs text-gray-500 font-mono shadow-sm z-10 shrink-0 flex justify-between">
                <span>Preview Output</span>
                <span class="flex space-x-1">
                    <span class="w-3 h-3 rounded-full bg-red-400"></span>
                    <span class="w-3 h-3 rounded-full bg-yellow-400"></span>
                    <span class="w-3 h-3 rounded-full bg-green-400"></span>
                </span>
            </div>
            <iframe id="previewFrame" class="flex-1 w-full border-none bg-white"></iframe>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const editorTextarea = document.getElementById('editor');
            const languageSelector = document.getElementById('languageSelector');
            const runBtn = document.getElementById('runBtn');
            const clearBtn = document.getElementById('clearBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const fileUpload = document.getElementById('fileUpload');
            const previewFrame = document.getElementById('previewFrame');
            const uploadStatus = document.getElementById('uploadStatus');

            // Store uploaded multi-file contents
            let projectFiles = { html: '', css: '', js: '' };

            // CodeMirror Configuration Mapping
            const modes = {
                'html': { mode: 'htmlmixed', placeholder: '' },
                'css': { mode: 'css', placeholder: '/* Write your CSS here... */' },
                'javascript': { mode: 'javascript', placeholder: '// Write your JavaScript here...\n// Syntax errors will be underlined.' }
            };

            // Initialize CodeMirror
            const editor = CodeMirror.fromTextArea(editorTextarea, {
                lineNumbers: true,
                theme: 'dracula',
                mode: modes['html'].mode,
                placeholder: modes['html'].placeholder,
                indentUnit: 4,
                matchBrackets: true,
                autoCloseTags: true,
                lint: true,
                gutters: ["CodeMirror-lint-markers"]
            });

            // 1. Language Selector Logic
            languageSelector.addEventListener('change', (e) => {
                const lang = e.target.value;
                const config = modes[lang];
                
                // Update CodeMirror Mode and Placeholder
                editor.setOption('mode', config.mode);
                editor.setOption('placeholder', config.placeholder);
                
                // Enable/Disable Linting based on language
                editor.setOption('lint', lang === 'javascript');
            });

            // 2. Run / Render Logic
            const renderPreview = () => {
                const currentCode = editor.getValue();
                const currentLang = languageSelector.value;
                let finalHTML = '';

                // If user uploaded files, prioritize combining them, overriding with current editor content based on selected tab
                if (projectFiles.html || projectFiles.css || projectFiles.js) {
                    let h = currentLang === 'html' ? currentCode : projectFiles.html;
                    let c = currentLang === 'css' ? currentCode : projectFiles.css;
                    let j = currentLang === 'javascript' ? currentCode : projectFiles.js;
                    
                    finalHTML = `
                        <!DOCTYPE html>
                        <html>
                            <head>
                                <style>${c}</style>
                            </head>
                            <body>
                                ${h}
                                <script>${j}<\/script>
                            </body>
                        </html>
                    `;
                } 
                // Normal Single File Mode
                else {
                    if (currentLang === 'html') {
                        finalHTML = currentCode;
                    } else if (currentLang === 'css') {
                        finalHTML = `
                            <!DOCTYPE html>
                            <html>
                            <head><style>${currentCode}</style></head>
                            <body style="font-family: sans-serif; padding: 20px;">
                                <h2>CSS Live Preview</h2>
                                <p>This is standard HTML to showcase your CSS rules.</p>
                                <button class="btn">Test Button</button>
                                <div class="box">Test Box</div>
                            </body>
                            </html>
                        `;
                    } else if (currentLang === 'javascript') {
                        finalHTML = `
                            <!DOCTYPE html>
                            <html>
                            <head></head>
                            <body style="font-family: sans-serif; padding: 20px;">
                                <h2>JavaScript Live Preview</h2>
                                <p>Check the browser console (F12) for console.log outputs.</p>
                                <div id="app"></div>
                                <script>
                                    try {
                                        ${currentCode}
                                    } catch (e) {
                                        document.body.innerHTML += '<p style="color:red;">Error: ' + e.message + '</p>';
                                    }
                                <\/script>
                            </body>
                            </html>
                        `;
                    }
                }

                // Inject into iframe using srcdoc for security and performance
                previewFrame.srcdoc = finalHTML;
            };

            runBtn.addEventListener('click', renderPreview);

            // 3. Multi-file Project Upload Logic
            fileUpload.addEventListener('change', (e) => {
                const files = e.target.files;
                if (files.length === 0) return;

                projectFiles = { html: '', css: '', js: '' };
                let filesProcessed = 0;

                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const content = event.target.result;
                        if (file.name.endsWith('.html')) projectFiles.html += content + '\n';
                        else if (file.name.endsWith('.css')) projectFiles.css += content + '\n';
                        else if (file.name.endsWith('.js')) projectFiles.js += content + '\n';

                        filesProcessed++;
                        if (filesProcessed === files.length) {
                            uploadStatus.classList.remove('hidden');
                            setTimeout(() => uploadStatus.classList.add('hidden'), 3000);
                            renderPreview(); // Auto-run after upload
                        }
                    };
                    reader.readAsText(file);
                });
            });

            // 4. Clear Logic
            clearBtn.addEventListener('click', () => {
                editor.setValue('');
                previewFrame.srcdoc = '';
                projectFiles = { html: '', css: '', js: '' };
                fileUpload.value = '';
            });

            // 5. Download Logic
            downloadBtn.addEventListener('click', () => {
                const code = editor.getValue();
                if (!code) return alert("Editor is empty!");

                const ext = languageSelector.value === 'javascript' ? 'js' : languageSelector.value;
                const blob = new Blob([code], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `script.${ext}`;
                document.body.appendChild(a);
                a.click();
                
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });

            // Initial focus
            editor.focus();
        });
    </script>
</body>
</html>
